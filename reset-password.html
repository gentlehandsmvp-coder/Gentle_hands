<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Gentle Hands Zambia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800;900&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ===== CSS Variables - Gentle Hands Zambia Brand Palette ===== */
        :root {
            /* Primary Brand Colors */
            --teal: #6BA2A0;
            --teal-deep: #3E6F6C;
            --terracotta: #D97A5C;
            --blush: #E8A2A6;
            --cream: #F5F0E1;
            --cream-light: #FCFBF8;
            
            /* Supporting Colors */
            --sage: #AFC8B8;
            --charcoal: #4A4A4A;
            --gray-light: #E7ECEB;
            
            /* Status Colors */
            --success: #4CAF50;
            --warning: #F4A261;
            --error: #E76F51;
            --info: #5B8DEF;
            
            /* Derived Variables */
            --primary-navy: var(--teal-deep);
            --primary-teal: var(--teal);
            --warm-stone: var(--terracotta);
            --warm-blush: var(--blush);
            --bg: var(--cream-light);
            --text: var(--charcoal);
            --muted: #6B7A78;
            --shadow: 0 20px 60px rgba(62, 111, 108, 0.14);
            --shadow-sm: 0 4px 20px rgba(62, 111, 108, 0.08);
            --radius-xl: 24px;
            --radius-lg: 18px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --max-width: 400px;
        }

        /* ===== Reset & Base ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: "Nunito", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: var(--text);
            background: var(--bg);
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        a {
            color: inherit;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        img {
            max-width: 100%;
            display: block;
        }

        .container {
            width: 100%;
            max-width: var(--max-width);
            margin: 0 auto;
        }

        /* ===== Typography ===== */
        h1, h2, h3, h4 {
            font-family: "Poppins", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        h1 {
            font-size: clamp(1.8rem, 3vw, 2.2rem);
            color: var(--teal-deep);
        }
        h2 {
            font-size: clamp(1.6rem, 2.5vw, 2rem);
            color: var(--teal-deep);
        }
        h3 {
            font-size: clamp(1.1rem, 1.5vw, 1.3rem);
            color: var(--teal-deep);
        }
        h4 {
            font-size: clamp(1rem, 1.2vw, 1.1rem);
        }

        .text-center {
            text-align: center;
        }
        .text-gray {
            color: var(--muted);
        }
        .mb-4 {
            margin-bottom: 1.5rem;
        }
        .mt-4 {
            margin-top: 1.5rem;
        }

        /* ===== Buttons ===== */
        .btn {
            display: inline-block;
            border: none;
            cursor: pointer;
            border-radius: 999px;
            padding: 0.85rem 2rem;
            font-family: "Poppins", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.02em;
            transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
            text-align: center;
        }

        .btn:active {
            transform: translateY(1px) scale(0.98);
        }
        .btn:hover {
            transform: translateY(-3px);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--teal) 0%, var(--teal-deep) 100%);
            color: #fff;
            box-shadow: 0 16px 32px rgba(62, 111, 108, 0.28);
        }
        .btn-primary:hover {
            box-shadow: 0 20px 40px rgba(62, 111, 108, 0.35);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--terracotta) 0%, #C96A4C 100%);
            color: #fff;
            box-shadow: 0 16px 32px rgba(217, 122, 92, 0.28);
        }
        .btn-secondary:hover {
            box-shadow: 0 20px 40px rgba(217, 122, 92, 0.35);
        }

        .btn-sage {
            background: var(--sage);
            color: var(--teal-deep);
            box-shadow: 0 16px 32px rgba(175, 200, 184, 0.3);
        }
        .btn-sage:hover {
            box-shadow: 0 20px 40px rgba(175, 200, 184, 0.4);
        }

        .btn-lg {
            padding: 1rem 2.8rem;
            font-size: 1.05rem;
        }
        .btn-lg.w-full {
            width: 100%;
            justify-content: center;
        }

        .btn-sm {
            padding: 0.4rem 1.2rem;
            font-size: 0.8rem;
        }

        .w-full {
            width: 100%;
            justify-content: center;
        }

        /* ===== Cards ===== */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: var(--radius-lg);
            padding: 2rem 2rem 2.5rem;
            border: 1px solid var(--gray-light);
            box-shadow: var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow);
        }

        /* ===== Form ===== */
        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-label {
            display: block;
            font-family: "Poppins", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text);
            margin-bottom: 0.4rem;
        }

        .form-control {
            width: 100%;
            border: 1px solid var(--gray-light);
            background: rgba(255, 255, 255, 0.9);
            border-radius: var(--radius-md);
            padding: 0.85rem 1rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
            font-family: "Nunito", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 0.95rem;
        }

        .form-control:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 4px rgba(107, 162, 160, 0.15);
            background: #fff;
        }

        /* ===== Notification ===== */
        .notification {
            display: none;
            padding: 0.8rem 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .notification.success {
            display: block;
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.2);
            color: #2E7D32;
        }

        .notification.error {
            display: block;
            background: rgba(231, 111, 81, 0.1);
            border: 1px solid rgba(231, 111, 81, 0.2);
            color: #C0392B;
        }

        /* ===== Reset Icon ===== */
        .reset-icon {
            text-align: center;
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
        }

        .reset-subtitle {
            text-align: center;
            color: var(--muted);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        /* ===== Back Link ===== */
        .back-link {
            text-align: center;
            margin-top: 1.2rem;
        }

        .back-link a {
            color: var(--muted);
            font-weight: 600;
            transition: color 0.3s ease;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .back-link a:hover {
            color: var(--teal-deep);
        }

        .back-link a::before {
            content: "←";
            font-size: 1.1rem;
        }

        /* ===== Responsive ===== */
        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }
            .card {
                padding: 1.5rem 1.2rem 2rem;
            }
            .reset-icon {
                font-size: 2.8rem;
            }
            .btn {
                font-size: 0.9rem;
                padding: 0.75rem 1.5rem;
            }
        }

        /* ===== Animations ===== */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .card {
            opacity: 0;
            animation: fadeUp 0.6s ease forwards;
        }

        .notification {
            animation: slideIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
    </style>
</head>
<body>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="container">
        <div class="card">

            <!-- Icon -->
            <div class="reset-icon">🔐</div>

            <!-- Title -->
            <h2 class="text-center">Reset Password</h2>
            <p class="reset-subtitle">Enter your email address and we'll send you a link to reset your password</p>

            <!-- Notification -->
            <div id="notification" class="notification"></div>

            <!-- Form -->
            <form onsubmit="handlePasswordReset(event)">
                <div class="form-group">
                    <label class="form-label" for="resetEmail">Email Address</label>
                    <input type="email" id="resetEmail" class="form-control" placeholder="you@example.com" required>
                </div>

                <button type="submit" class="btn btn-primary w-full">
                    Send Reset Link
                </button>
            </form>

            <!-- Back Link -->
            <div class="back-link">
                <a href="login.html">Back to Login</a>
            </div>

        </div>
    </div>

    <!-- ===== JAVASCRIPT ===== -->
    <script>
        // ============================================================
        // Initialize Supabase
        // ============================================================
        const SUPABASE_URL = 'https://YOUR_PROJECT_ID.supabase.co';
        const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        // Show Notification
        // ============================================================
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = 'notification ' + type;

            // Auto-hide after 5 seconds
            clearTimeout(window.notificationTimeout);
            window.notificationTimeout = setTimeout(function() {
                notification.className = 'notification';
            }, 5000);
        }

        // ============================================================
        // Handle Password Reset
        // ============================================================
        async function handlePasswordReset(event) {
            event.preventDefault();

            const email = document.getElementById('resetEmail').value;

            if (!email) {
                showNotification('Please enter your email address.', 'error');
                return;
            }

            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/update-password.html'
                });

                if (error) throw error;

                showNotification('✅ Password reset email sent! Please check your inbox.', 'success');
                document.getElementById('resetEmail').value = '';

            } catch (error) {
                console.error('Password reset error:', error);
                showNotification('❌ ' + error.message, 'error');
            }
        }

        // ============================================================
        // Handle Enter key on input
        // ============================================================
        document.getElementById('resetEmail').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.querySelector('form').dispatchEvent(new Event('submit'));
            }
        });
    </script>

</body>
</html>
